name: Build All (Android + iOS + Windows)

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Server URL'
        required: true
        default: 'http://104.244.95.70:8098'
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '1.1.0'

env:
  APP_VERSION: ${{ inputs.version || '1.1.0' }}
  SERVER_URL: ${{ inputs.server_url || 'http://104.244.95.70:8098' }}

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Fix Gradle permissions and add Maven mirror
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties << 'GRADLEEOF'
          systemProp.http.proxyHost=
          systemProp.http.proxyPort=
          systemProp.https.proxyHost=
          systemProp.https.proxyPort=
          GRADLEEOF
      - name: Generate debug keystore for CI
        run: |
          keytool -genkey -v -keystore android/app/debug.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias androiddebugkey -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true
          cat > android/app/key.properties << PROPEOF
          storePassword=android
          keyPassword=android
          keyAlias=androiddebugkey
          storeFile=debug.keystore
          PROPEOF
      - run: |
          for i in 1 2 3; do
            flutter build apk --release \
              --dart-define=SERVER_URL=${{ env.SERVER_URL }} \
              --build-name=${{ env.APP_VERSION }} && break
            if [ $i -lt 3 ]; then
              echo "Retry $i/3 failed, waiting 10s..."
              sleep 10
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: NeoAnt-Android-v${{ env.APP_VERSION }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Recreate iOS platform
        run: |
          rm -rf ios
          flutter create --platforms=ios .
          flutter pub get
      - run: |
          flutter build ios --release --no-codesign \
            --dart-define=SERVER_URL=${{ env.SERVER_URL }} \
            --build-name=${{ env.APP_VERSION }}
      - run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r NeoAnt-iOS-v${{ env.APP_VERSION }}.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: NeoAnt-iOS-v${{ env.APP_VERSION }}
          path: NeoAnt-iOS-v${{ env.APP_VERSION }}.ipa
          retention-days: 30
      - name: Upload iOS to server
        shell: bash
        run: |
          FILE="NeoAnt-iOS-v${{ env.APP_VERSION }}.ipa"
          curl -X POST "http://104.244.95.70:8098/api/upload-artifact" \
            -H "X-Filename: $FILE" \
            --data-binary "@$FILE"

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter create --platforms=windows .
      - run: flutter config --enable-windows-desktop
      - run: |
          flutter build windows --release --dart-define=SERVER_URL=${{ env.SERVER_URL }} --build-name=${{ env.APP_VERSION }}
      - shell: pwsh
        run: |
          $ver = "${{ env.APP_VERSION }}"
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath NeoAnt-Windows-v$ver.zip
      - uses: actions/upload-artifact@v4
        with:
          name: NeoAnt-Windows-v${{ env.APP_VERSION }}
          path: NeoAnt-Windows-v${{ env.APP_VERSION }}.zip
          retention-days: 30
      - name: Upload to server
        shell: pwsh
        run: |
          $ver = "${{ env.APP_VERSION }}"
          $url = "http://104.244.95.70:8098/api/upload-artifact"
          $file = "NeoAnt-Windows-v$ver.zip"
          Invoke-WebRequest -Uri $url -Method Post -InFile $file -ContentType "application/zip" -Headers @{"X-Filename"="$file"} | Select-Object -ExpandProperty Content
