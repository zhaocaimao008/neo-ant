name: Build iOS IPA (macOS Runner)

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Server URL (e.g. https://dipsin.com)'
        required: true
        default: 'https://dipsin.com'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: |
          cd ios
          pod install --repo-update
      - run: |
          flutter build ios --release --no-codesign \
            --dart-define=SERVER_URL=${{ inputs.server_url }}
      - run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r neo-ant.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: neo-ant-ios-release
          path: neo-ant.ipa
          retention-days: 7
