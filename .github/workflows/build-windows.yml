name: Build Windows EXE (Windows Runner)

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Server URL (e.g. https://dipsin.com)'
        required: true
        default: 'https://dipsin.com'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      - run: |
          flutter build windows --release `
            --dart-define=SERVER_URL=${{ inputs.server_url }}
      - shell: pwsh
        run: |
          Compress-Archive -Path build\windows\runner\Release\* `
            -DestinationPath NeoAnt-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: neo-ant-windows-release
          path: NeoAnt-Windows.zip
          retention-days: 7
